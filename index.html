<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyecto Fresa - Investigación Botánica</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Cargando investigación...</div>
  <script>
    window.$docsify = {
      name: '🍓 Proyecto Fresa',
      repo: 'tu-usuario/tu-repositorio', // Reemplaza con tu link de GitHub
      coverpage: false, // Puedes poner true si quieres una portada
      loadSidebar: true, // Habilitamos la barra lateral
      subMaxLevel: 2,
      auto2top: true,
      // Configuración de Mermaid
      mermaidConfig: { queryMethods: ['mermaid'] }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.js"></script>
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: true });</script>
</body>
</html>
